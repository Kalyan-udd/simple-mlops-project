<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureNote ML - Authenticator Tool</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 flex flex-col min-h-screen">

    <!-- Unified Navbar (Matches Home Page) -->
    <header class="w-full bg-white shadow-sm">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/">
            <div class="text-2xl font-black text-indigo-600 tracking-tight">
                SecureNote<span class="text-slate-800">ML</span>
            </div>
            </a>
            <nav>
                <a href="/" class="text-sm font-semibold text-slate-500 hover:text-indigo-600 transition">&larr; Back to Home</a>
            </nav>
        </div>
    </header>

    <!-- Main Tool Section -->
    <main class="flex-grow flex items-center justify-center p-6 py-12">
        <div class="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full border border-slate-100">
            <h1 class="text-2xl font-bold text-slate-900 mb-2 text-center tracking-tight">Authentication Tool</h1>
            <p class="text-sm text-slate-500 mb-8 text-center leading-relaxed">Enter the extracted numerical features below to verify the banknote's authenticity.</p>

            <!-- The HTML Form -->
            <form id="predictionForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Variance</label>
                    <input type="number" step="any" id="variance" required placeholder="e.g., 3.62"
                        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Skewness</label>
                    <input type="number" step="any" id="skewness" required placeholder="e.g., 8.66"
                        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Curtosis</label>
                    <input type="number" step="any" id="curtosis" required placeholder="e.g., -2.80"
                        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Entropy</label>
                    <input type="number" step="any" id="entropy" required placeholder="e.g., -0.44"
                        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-colors">
                </div>

                <button type="submit" 
                    class="w-full mt-8 py-3.5 px-4 rounded-xl text-base font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5">
                    Predict Authenticity
                </button>
            </form>

            <!-- Result Box -->
            <div id="resultBox" class="mt-6 hidden p-4 rounded-xl text-center font-bold text-lg border transition-all">
                <!-- Text goes here via JavaScript -->
            </div>
        </div>
    </main>
    <!-- The JavaScript Backend Connection -->
    <script>
        document.getElementById('predictionForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const inputData = {
                variance: parseFloat(document.getElementById('variance').value),
                skewness: parseFloat(document.getElementById('skewness').value),
                curtosis: parseFloat(document.getElementById('curtosis').value),
                entropy: parseFloat(document.getElementById('entropy').value)
            };

            const resultBox = document.getElementById('resultBox');
            resultBox.classList.remove('hidden', 'bg-emerald-50', 'text-emerald-700', 'border-emerald-200', 'bg-rose-50', 'text-rose-700', 'border-rose-200', 'bg-slate-50', 'text-slate-800', 'border-slate-200');
            
            resultBox.classList.add('bg-slate-50', 'text-slate-800', 'border-slate-200');
            resultBox.innerText = "Analyzing Securely...";

            try {
                const BASE_URL = window.location.origin;
                const response = await fetch(`${BASE_URL}/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(inputData)
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.prediction_class === 0) {
                        resultBox.classList.replace('bg-slate-50', 'bg-emerald-50');
                        resultBox.classList.replace('text-slate-800', 'text-emerald-700');
                        resultBox.classList.replace('border-slate-200', 'border-emerald-200');
                        resultBox.innerText = "✅ Authentic Banknote";
                    } else {
                        resultBox.classList.replace('bg-slate-50', 'bg-rose-50');
                        resultBox.classList.replace('text-slate-800', 'text-rose-700');
                        resultBox.classList.replace('border-slate-200', 'border-rose-200');
                        resultBox.innerText = "🚨 Fake/Forged Banknote!";
                    }
                } else {
                    resultBox.innerText = "Error: Invalid data format.";
                }
            } catch (error) {
                console.error("Error:", error);
                resultBox.classList.replace('bg-slate-50', 'bg-rose-50');
                resultBox.classList.replace('text-slate-800', 'text-rose-700');
                resultBox.classList.replace('border-slate-200', 'border-rose-200');
                resultBox.innerText = "Cannot connect to backend API. Is FastAPI running?";
            }
        });
    </script>
</body>
</html>
